<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CHORUS β - Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-section">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>CHORUS β</h1>
          <span class="badge">Public Bridge</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn dashboard-btn" id="dashboardToggle">
          <span class="btn-icon">📊</span>
          <span class="btn-text">Dashboard</span>
        </button>
        <div class="header-status">
          <span class="status-dot offline"></span>
          <span class="status-text">Disconnected</span>
        </div>
      </div>
    </div>
  </header>
  
  <!-- Bridge Content -->
  <div id="bridgeContent">
    <main>
      <section class="card card-servers">
        <div class="card-header">
          <h2>🖥️ Servers</h2>
          <span class="card-badge" id="servers-count">0</span>
        </div>
        <div id="servers" class="server-list">Loading...</div>
      </section>
      
      <section class="card card-commands">
        <div class="card-header">
          <h2>⌨️ Commands</h2>
          <span class="card-badge" id="commands-count">0</span>
        </div>
        <div id="commands" class="command-list">Loading...</div>
      </section>
      
      <section class="card card-search">
        <div class="card-header">
          <h2>🔍 Knowledge Search</h2>
        </div>
        <div class="search-container">
          <input id="q" placeholder="Search knowledge base..." autocomplete="off" />
          <button id="bs">Search</button>
        </div>
        <div id="kres" class="knowledge-results"></div>
      </section>
    </main>
    
    <footer>
      <div class="footer-content">
        <span>Configure API base in <code>config.js</code></span>
        <span class="footer-divider">•</span>
        <span>CHORUS β Bridge v1.0</span>
      </div>
    </footer>
  </div>

  <!-- Dashboard Overlay -->
  <div id="dashboardOverlay" class="dashboard-overlay hidden">
    <div class="dashboard-container" id="dashboardContainer">
      <div class="dashboard-header">
        <div class="dashboard-header-left">
          <span class="dashboard-icon">📊</span>
          <div>
            <h2>CHORUS β Dashboard</h2>
            <span class="dashboard-subtitle">Full Control Panel</span>
          </div>
        </div>
        <div class="dashboard-header-actions">
          <button class="dashboard-fullscreen-btn" id="dashboardFullscreenBtn" title="Toggle Fullscreen">
            <span class="fullscreen-icon">⛶</span>
            <span>Fullscreen</span>
          </button>
          <button class="dashboard-close-btn" id="dashboardCloseBtn">
            <span class="close-icon">✕</span>
            <span>Close</span>
          </button>
        </div>
      </div>
      <div class="dashboard-iframe-wrapper">
        <div class="dashboard-loading" id="dashboardLoading">
          <div class="loading-spinner"></div>
          <span>Loading Dashboard...</span>
        </div>
        <iframe 
          id="dashboardFrame" 
          class="dashboard-iframe" 
          src="about:blank" 
          frameborder="0"
          allowfullscreen
          sandbox="allow-same-origin allow-scripts allow-popups allow-modals allow-forms"
          allow="fullscreen"
        ></iframe>
      </div>
    </div>
  </div>
  
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
