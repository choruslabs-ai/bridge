<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CHORUS β - Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-section">
        <div class="logo-icon">⚡</div>
        <div>
          <h1>CHORUS β</h1>
          <span class="badge">Public Bridge</span>
        </div>
      </div>
      <div class="header-status">
        <span class="status-dot offline"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </div>
  </header>
  
  <main>
    <section class="card card-servers">
      <div class="card-header">
        <h2>🖥️ Servers</h2>
        <span class="card-badge" id="servers-count">0</span>
      </div>
      <div id="servers" class="server-list">Loading...</div>
    </section>
    
    <section class="card card-commands">
      <div class="card-header">
        <h2>⌨️ Commands</h2>
        <span class="card-badge" id="commands-count">0</span>
      </div>
      <div id="commands" class="command-list">Loading...</div>
    </section>
    
    <section class="card card-search">
      <div class="card-header">
        <h2>🔍 Knowledge Search</h2>
      </div>
      <div class="search-container">
        <input id="q" placeholder="Search knowledge base..." autocomplete="off" />
        <button id="bs">Search</button>
      </div>
      <div id="kres" class="knowledge-results"></div>
    </section>
  </main>
  
  <footer>
    <div class="footer-content">
      <span>Configure API base in <code>config.js</code></span>
      <span class="footer-divider">•</span>
      <span>CHORUS β Bridge v1.0</span>
    </div>
  </footer>
  
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
